name: Strat Scanner

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: strat-scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug raw curl test (safe - only prints HTTP status code)
        run: |
          curl -s -o /dev/null -w "HTTP status: %{http_code}\n" \
            -H "APCA-API-KEY-ID: $ALPACA_API_KEY" \
            -H "APCA-API-SECRET-KEY: $ALPACA_SECRET_KEY" \
            "https://data.alpaca.markets/v2/stocks/bars?symbols=SPY&timeframe=1Day&limit=5"
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

      - name: Run one scan cycle
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          TWILIO_WHATSAPP_TO: ${{ secrets.TWILIO_WHATSAPP_TO }}
          LOG_LEVEL: INFO
        run: python main.py --once

      - name: Persist debounce state back to the repo
        run: |
          git config user.name "strat-scanner-bot"
          git config user.email "actions@users.noreply.github.com"
          git add scanner_state.db tickers.txt latest_scan.json
          if ! git diff --cached --quiet; then
            git commit -m "Update scanner state [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi
