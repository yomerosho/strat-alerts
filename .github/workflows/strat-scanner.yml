name: Strat Scanner

# Triggered externally by cron-job.org (GitHub's native cron silently disables
# itself on inactive repos -- that's why this is workflow_dispatch only).
#
# Scope the cron-job.org schedule to market hours: 9:30-16:00 ET, Mon-Fri.
# Every 5 minutes is right: it matches the Tier 1 (5m close) cadence. Fire it
# ~60s after each 5-minute boundary so the bar has settled at Alpaca before
# you ask for it.
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: strat-scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Scan
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_DATA_FEED: ${{ secrets.ALPACA_DATA_FEED }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Uncomment to gate alerts on continuity (0 = off, the default):
          # MIN_CONTINUITY_TIER1: "3"
          # MIN_CONTINUITY_TIER2: "4"
          PROXIMITY_ALERT_PCT: "0.75"
          LOG_LEVEL: INFO
        run: python main.py --once

      - name: Persist alert-dedup state
        # The runner is a fresh VM each time. sent_alerts must survive between
        # runs or you'd get a duplicate alert every 5 minutes.
        run: |
          git config user.name  "strat-scanner-bot"
          git config user.email "actions@users.noreply.github.com"
          git add scanner_state.db tickers.txt latest_scan.json
          if ! git diff --cached --quiet; then
            git commit -m "scan state [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          else
            echo "No changes."
          fi
